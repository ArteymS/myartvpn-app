name: Build MyArtVPN App
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Download Core Library
        run: |
          mkdir -p android/app/libs
          curl -L https://github.com/hiddify/hiddify-next-core/releases/download/v4.1.0/hiddify-lib-android.tar.gz | tar xz -C android/app/libs/

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: MyArtVPN-Android
          path: build/app/outputs/flutter-apk/app-release.apk
